<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Scrobble Stats</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="data/stats.js"></script>
<script src="data/scrobbles.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #151515;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #d51007;
  --accent-dim: #a00d06;
  --accent-light: #ff3b30;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-dim: #666;
  --accent: #d51007;
  --accent-dim: #a00d06;
  --accent-light: #c50e06;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header .meta { color: var(--text-dim); font-size: 13px; margin-left: auto; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  gap: 0;
  overflow-x: auto;
}
.tab {
  padding: 12px 20px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 14px;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

/* Content */
.content { padding: 24px; max-width: 1400px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.card .value.accent { color: var(--accent-light); }

/* Chart containers */
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.chart { width: 100%; height: 400px; }
.chart.tall { height: 1100px; }
.chart.short { height: 300px; }

/* Breadcrumb */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  margin-bottom: 12px;
}
.breadcrumb span { color: var(--text-dim); cursor: pointer; }
.breadcrumb span:hover { color: var(--text); }
.breadcrumb span.current { color: var(--text); cursor: default; }
.breadcrumb .sep { color: var(--text-dim); }

/* Year selector */
.year-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 16px;
}

/* Table */
.stats-table {
  width: 100%;
  border-collapse: collapse;
}
.stats-table th, .stats-table td {
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.stats-table th { color: var(--text-dim); font-size: 12px; text-transform: uppercase; font-weight: 600; }
.stats-table td { font-size: 14px; }
.stats-table tr:hover { background: var(--surface2); }
.stats-table .rank { color: var(--text-dim); width: 40px; }
.stats-table .count { color: var(--accent-light); font-weight: 600; text-align: right; }

/* Search */
.search-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 4px;
  font-size: 14px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 16px;
}
.search-input::placeholder { color: var(--text-dim); }

/* Row layout */
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 900px) { .row { grid-template-columns: 1fr; } }

.loved-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.loved-item .artist { color: var(--text-dim); }
.loved-item .date { color: var(--text-dim); font-size: 12px; float: right; }

/* Scrobble drill-down table */
.scrobble-table { width: 100%; border-collapse: collapse; }
.scrobble-table th, .scrobble-table td {
  padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px;
}
.scrobble-table th { color: var(--text-dim); font-size: 11px; text-transform: uppercase; font-weight: 600; position: sticky; top: 0; background: var(--surface); }
.scrobble-table tr:hover { background: var(--surface2); }
.scrobble-table .loved-icon { color: var(--accent-light); }
.scrobble-table .dim { color: var(--text-dim); }
.pagination {
  display: flex; align-items: center; gap: 8px; padding: 12px 0; font-size: 13px; color: var(--text-dim);
}
.pagination button {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px;
  border-radius: 4px; cursor: pointer; font-size: 13px;
}
.pagination button:hover { background: var(--border); }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.drill-table-wrap { max-height: 600px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }

/* Theme toggle */
.theme-toggle {
  background: none; border: none; cursor: pointer; font-size: 18px;
  color: var(--text-dim); padding: 4px 8px; border-radius: 4px;
}
.theme-toggle:hover { background: var(--surface2); color: var(--text); }

/* Filter button */
.filter-btn {
  background: none; border: none; cursor: pointer; font-size: 18px;
  color: var(--text-dim); padding: 4px 8px; border-radius: 4px;
  position: relative;
}
.filter-btn:hover { background: var(--surface2); color: var(--text); }
.filter-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px; line-height: 1;
}

/* Filter panel */
.filter-panel {
  position: fixed; top: 0; right: 0; width: 360px; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 100; padding: 24px; overflow-y: auto;
  transform: translateX(100%); transition: transform 0.2s;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
.filter-panel.open { transform: translateX(0); }
.filter-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 99; display: none;
}
.filter-overlay.open { display: block; }
.filter-panel h2 {
  font-size: 16px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.filter-panel .close-btn {
  background: none; border: none; cursor: pointer; font-size: 20px;
  color: var(--text-dim); padding: 4px 8px; border-radius: 4px;
}
.filter-panel .close-btn:hover { color: var(--text); background: var(--surface2); }
.filter-search {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 14px; border-radius: 6px; font-size: 14px; width: 100%;
  margin-bottom: 8px;
}
.filter-search::placeholder { color: var(--text-dim); }
.filter-search-results {
  max-height: 240px; overflow-y: auto; margin-bottom: 16px;
}
.filter-search-item {
  padding: 8px 12px; cursor: pointer; font-size: 13px;
  border-radius: 4px; color: var(--text);
}
.filter-search-item:hover { background: var(--surface2); }
.filter-section-label {
  font-size: 12px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 8px; display: flex;
  align-items: center; justify-content: space-between;
}
.filter-clear-all {
  font-size: 11px; color: var(--accent-light); cursor: pointer;
  text-transform: none; letter-spacing: 0;
}
.filter-clear-all:hover { text-decoration: underline; }
.filter-excluded-list { margin-bottom: 16px; }
.filter-excluded-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; font-size: 13px; border-bottom: 1px solid var(--border);
}
.filter-excluded-item .remove-btn {
  background: none; border: none; cursor: pointer; font-size: 16px;
  color: var(--text-dim); padding: 2px 6px; border-radius: 4px;
}
.filter-excluded-item .remove-btn:hover { color: var(--accent-light); background: var(--surface2); }
.filter-empty {
  color: var(--text-dim); font-size: 13px; padding: 8px 0;
}

/* Header exclusion indicator */
.exclusion-indicator {
  font-size: 12px; color: var(--text-dim); margin-left: 8px;
}
.exclusion-indicator .clear-link {
  color: var(--accent-light); cursor: pointer; margin-left: 4px;
}
.exclusion-indicator .clear-link:hover { text-decoration: underline; }

/* Filtered label on cards */
.card .filtered-label {
  font-size: 10px; color: var(--accent-light); margin-top: 2px;
}

/* Entity links in scrobble table */
.entity-link { color: inherit; text-decoration: none; cursor: pointer; }
.entity-link:hover { color: var(--accent-light); text-decoration: underline; }

/* Filter chips bar */
.filter-chips {
  display: flex; gap: 8px; padding: 8px 24px; flex-wrap: wrap;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 4px 12px; font-size: 12px; color: var(--text);
}
.filter-chip .chip-remove {
  cursor: pointer; color: var(--text-dim); font-size: 14px; line-height: 1;
}
.filter-chip .chip-remove:hover { color: var(--accent-light); }

@media (max-width: 500px) {
  .filter-panel { width: 100vw; }
}
</style>
</head>
<body>
<script>
// Apply saved theme before first render to prevent flash
(function() {
  const saved = localStorage.getItem('lastfm-theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>

<div class="header">
  <h1><span>Last.fm</span> Scrobble Stats</h1>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme"></button>
  <button class="filter-btn" id="filterBtn" title="Exclude artists">&#9881;</button>
  <div class="meta" id="headerMeta"></div>
  <span class="exclusion-indicator" id="exclusionIndicator"></span>
</div>

<div class="filter-overlay" id="filterOverlay"></div>
<div class="filter-panel" id="filterPanel">
  <h2>Exclude Artists <button class="close-btn" id="filterClose">&times;</button></h2>
  <input class="filter-search" id="filterSearch" placeholder="Search artists to exclude..." autocomplete="off">
  <div class="filter-search-results" id="filterSearchResults"></div>
  <div class="filter-section-label">
    <span>Excluded Artists</span>
    <span class="filter-clear-all" id="filterClearAll" style="display:none">Clear All</span>
  </div>
  <div class="filter-excluded-list" id="filterExcludedList"></div>
</div>

<div class="tabs" id="tabsBar"></div>
<div class="filter-chips" id="filterChips" style="display:none"></div>

<div class="content" id="content"></div>

<script>
const S = window.LASTFM_STATS;
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

// Format numbers
const fmt = n => n.toLocaleString();
const fmtDate = ts => new Date(ts * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtMonth = m => { const [y, mo] = m.split('-'); return new Date(y, mo - 1).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }); };
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Scrobble data decoder
const SC = window.LASTFM_SCROBBLES;
function decodeScrobble(s) {
  return { artist: SC.a[s[0]], track: SC.t[s[1]], album: SC.l[s[2]], timestamp: s[3], loved: s.length > 4 };
}

// === Artist Exclusion ===
let excludedArtists = new Set(JSON.parse(localStorage.getItem('lastfm-excluded-artists') || '[]'));

function saveExcludedArtists() {
  localStorage.setItem('lastfm-excluded-artists', JSON.stringify([...excludedArtists]));
}

function isExcluded(artistIdx) {
  return excludedArtists.has(SC.a[artistIdx]);
}

function hasExclusions() {
  return excludedArtists.size > 0;
}

// Filter top items (from stats.js pre-aggregated data) whose name starts with "ArtistName — ..."
function filterTopItems(items) {
  if (!hasExclusions()) return items;
  return items.filter(item => {
    const artist = item.name.split(' \u2014 ')[0];
    return !excludedArtists.has(artist);
  });
}

// Filter top artist items by exact name match
function filterTopArtists(items) {
  if (!hasExclusions()) return items;
  return items.filter(item => !excludedArtists.has(item.name));
}

// Filter items by entity state (artist/track/album from state)
function filterByEntityState(items) {
  if (!state.artist && !state.album) return items;
  return items.filter(item => {
    const artist = item.name.split(' \u2014 ')[0];
    if (state.artist && artist !== state.artist) return false;
    return true;
  });
}

// Compute top-N tracks/albums from raw scrobbles when entity filters are active
function computeTopFromRaw(type, n = 50) {
  const counts = {};
  for (const s of SC.s) {
    if (isExcluded(s[0])) continue;
    if (state.artist && SC.a[s[0]] !== state.artist) continue;
    if (state.album && SC.l[s[2]] !== state.album) continue;
    const key = type === 'tracks'
      ? `${SC.a[s[0]]} \u2014 ${SC.t[s[1]]}`
      : `${SC.a[s[0]]} \u2014 ${SC.l[s[2]]}`;
    counts[key] = (counts[key] || 0) + 1;
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, n)
    .map(([name, count]) => ({ name, count }));
}

// Get top items: use pre-aggregated when no entity filter, raw computation otherwise
function getTopItems(type, year) {
  const hasEntityFilter = state.artist || state.album;
  if (!hasEntityFilter) {
    const source = type === 'tracks' ? S.top_tracks : S.top_albums;
    const rawItems = year === 'all' ? source.overall : (source.by_year[year] || []);
    return filterTopItems(rawItems);
  }
  // Compute from raw scrobbles
  return computeTopFromRaw(type);
}

// Cached filtered time-series + stats, recomputed from SC.s
const _ftsCache = new Map();
function invalidateFilteredCache() { _ftsCache.clear(); }

function getFilteredTimeSeries(params = {}) {
  const { startTs, endTs, artistIdx, trackIdx, albumIdx } = params;
  const hasParams = startTs || endTs || artistIdx !== undefined || trackIdx !== undefined || albumIdx !== undefined;

  // Cache key
  const cacheKey = `${startTs||''}|${endTs||''}|${artistIdx ?? ''}|${trackIdx ?? ''}|${albumIdx ?? ''}|${excludedArtists.size}`;
  if (_ftsCache.has(cacheKey)) return _ftsCache.get(cacheKey);

  // Fast path: no exclusions AND no params → return pre-aggregated data
  if (!hasExclusions() && !hasParams) {
    const result = {
      yearly: S.yearly, monthly: S.monthly, hourly: S.hourly,
      dow: S.dow, daily_counts: S.daily_counts,
      artist_yearly: S.artist_trends, years: S.meta.years,
      total_scrobbles: S.meta.total_scrobbles,
      unique_artists: S.meta.unique_artists,
      unique_tracks: S.meta.unique_tracks,
      unique_albums: S.meta.unique_albums,
      loved_count: S.meta.loved_count,
      filtered: false,
    };
    _ftsCache.set(cacheKey, result);
    return result;
  }

  // Single pass over all scrobbles to compute everything
  const yearlyCounts = {};
  const monthlyCounts = {};
  const dailyCounts = {};
  const hourlyArr = new Array(24).fill(0);
  const dowArr = new Array(7).fill(0);
  const artistYearly = {};
  const uniqueArtists = new Set();
  const uniqueTracks = new Set();
  const uniqueAlbums = new Set();
  let total = 0, loved = 0;
  const dowNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  for (const s of SC.s) {
    if (isExcluded(s[0])) continue;
    if (startTs && s[3] < startTs) continue;
    if (endTs && s[3] > endTs) continue;
    if (artistIdx !== undefined && s[0] !== artistIdx) continue;
    if (trackIdx !== undefined && s[1] !== trackIdx) continue;
    if (albumIdx !== undefined && s[2] !== albumIdx) continue;
    total++;
    uniqueArtists.add(s[0]);
    uniqueTracks.add(s[1]);
    uniqueAlbums.add(s[2]);
    if (s.length > 4) loved++;

    const ts = s[3];
    const d = new Date(ts * 1000);
    const year = String(d.getUTCFullYear());
    const month = year + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = month + '-' + String(d.getUTCDate()).padStart(2, '0');
    const hour = d.getUTCHours();
    const dow = (d.getUTCDay() + 6) % 7; // 0=Mon

    yearlyCounts[year] = (yearlyCounts[year] || 0) + 1;
    monthlyCounts[month] = (monthlyCounts[month] || 0) + 1;
    dailyCounts[day] = (dailyCounts[day] || 0) + 1;
    hourlyArr[hour]++;
    dowArr[dow]++;

    const artistName = SC.a[s[0]];
    if (!artistYearly[artistName]) artistYearly[artistName] = {};
    artistYearly[artistName][year] = (artistYearly[artistName][year] || 0) + 1;
  }

  // Convert to sorted arrays matching S.* format
  const yearsSorted = Object.keys(yearlyCounts).sort();
  const yearly = yearsSorted.map(y => ({ year: y, scrobbles: yearlyCounts[y] }));
  const monthly = Object.keys(monthlyCounts).sort().map(m => ({ month: m, count: monthlyCounts[m] }));
  const daily = Object.keys(dailyCounts).sort().map(d => ({ date: d, count: dailyCounts[d] }));
  const hourly = hourlyArr;
  const dow = dowArr.map((count, i) => ({ day: dowNames[i], count }));

  const result = {
    yearly, monthly, hourly, dow, daily_counts: daily,
    artist_yearly: artistYearly, years: yearsSorted,
    total_scrobbles: total,
    unique_artists: uniqueArtists.size,
    unique_tracks: uniqueTracks.size,
    unique_albums: uniqueAlbums.size,
    loved_count: loved,
    filtered: true,
  };
  // LRU: keep max 8 cache entries
  if (_ftsCache.size > 8) { const first = _ftsCache.keys().next().value; _ftsCache.delete(first); }
  _ftsCache.set(cacheKey, result);
  return result;
}

function getScrobblesInRange(startTs, endTs) {
  return SC.s.filter(s => s[3] >= startTs && s[3] <= endTs && !isExcluded(s[0])).map(decodeScrobble);
}
// Build O(1) artist name → index lookup
const artistIdxMap = new Map();
SC.a.forEach((name, i) => artistIdxMap.set(name, i));

function getScrobblesByArtist(artistName) {
  const ai = artistIdxMap.get(artistName);
  if (ai === undefined) return [];
  return SC.s.filter(s => s[0] === ai).map(decodeScrobble);
}
const fmtDateTime = ts => new Date(ts * 1000).toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

function scrobbleRowHtml(s) {
  return `<tr>
    <td class="dim">${fmtDateTime(s.timestamp)}</td>
    <td><a class="entity-link" data-type="track" data-value="${escAttr(s.track)}">${escHtml(s.track)}</a></td>
    <td class="dim"><a class="entity-link" data-type="artist" data-value="${escAttr(s.artist)}">${escHtml(s.artist)}</a></td>
    <td class="dim"><a class="entity-link" data-type="album" data-value="${escAttr(s.album)}">${escHtml(s.album)}</a></td>
    <td>${s.loved ? '<span class="loved-icon">\u2665</span>' : ''}</td>
  </tr>`;
}

let _activeObserver = null;
function renderScrobbleTable(scrobbles, containerId, batchSize = 100) {
  const total = scrobbles.length;
  let rendered = 0;

  // Clean up previous observer
  if (_activeObserver) { _activeObserver.disconnect(); _activeObserver = null; }

  const container = document.getElementById(containerId);
  if (!container) return;
  const wrapId = containerId + '_wrap';
  const bodyId = containerId + '_body';
  const sentinelId = containerId + '_sentinel';

  container.innerHTML = `
    <div class="drill-table-wrap" id="${wrapId}">
      <table class="scrobble-table">
        <thead><tr><th>Date</th><th>Track</th><th>Artist</th><th>Album</th><th></th></tr></thead>
        <tbody id="${bodyId}"></tbody>
      </table>
      <div id="${sentinelId}" style="height:1px"></div>
    </div>
    <div class="pagination"><span>${total.toLocaleString()} scrobbles</span></div>
  `;

  function appendBatch() {
    const tbody = document.getElementById(bodyId);
    if (!tbody) return;
    const end = Math.min(rendered + batchSize, total);
    let html = '';
    for (let i = rendered; i < end; i++) html += scrobbleRowHtml(scrobbles[i]);
    tbody.insertAdjacentHTML('beforeend', html);
    rendered = end;
    if (rendered >= total && _activeObserver) { _activeObserver.disconnect(); _activeObserver = null; }
  }

  appendBatch(); // initial batch

  const wrap = document.getElementById(wrapId);
  const sentinel = document.getElementById(sentinelId);
  if (wrap && sentinel && rendered < total) {
    _activeObserver = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) appendBatch();
    }, { root: wrap, rootMargin: '200px' });
    _activeObserver.observe(sentinel);
  }

  // Event delegation for entity links
  container.addEventListener('click', e => {
    const link = e.target.closest('.entity-link');
    if (!link) return;
    e.preventDefault();
    const type = link.dataset.type;
    const value = link.dataset.value;
    navigate({ [type]: value });
  });
}

// State
let state = { tab: 'overview', year: null, month: null, artist: null, track: null, album: null };
const charts = {};

// Tabs definition
const TABS = [
  { id: 'overview', label: 'Overview' },
  { id: 'artists', label: 'Artists' },
  { id: 'tracks', label: 'Tracks' },
  { id: 'albums', label: 'Albums' },
  { id: 'loved', label: 'Loved' },
  { id: 'trends', label: 'Trends' },
];

// Helper: compute UTC timestamp range from year/month
function getTimeRange(year, month) {
  if (!year) return {};
  const y = parseInt(year);
  const startTs = Math.floor(Date.UTC(y, month ? parseInt(month) - 1 : 0, 1) / 1000);
  const endTs = month
    ? Math.floor(Date.UTC(y, parseInt(month), 0, 23, 59, 59) / 1000)
    : Math.floor(Date.UTC(y + 1, 0, 0, 23, 59, 59) / 1000);
  return { startTs, endTs };
}

// Build filter params from current state for getFilteredTimeSeries
function getStateFilterParams() {
  const params = getTimeRange(state.year, state.month);
  if (state.artist) params.artistIdx = artistIdxMap.get(state.artist);
  if (state.track) params.trackIdx = trackIdxMap.get(state.track);
  if (state.album) params.albumIdx = albumIdxMap.get(state.album);
  return params;
}

// Build index maps for tracks and albums
const trackIdxMap = new Map();
SC.t.forEach((name, i) => trackIdxMap.set(name, i));
const albumIdxMap = new Map();
SC.l.forEach((name, i) => albumIdxMap.set(name, i));

// Filter chips rendering
function renderFilterChips() {
  const bar = $('#filterChips');
  const chips = [];
  if (state.year) chips.push({ label: state.month ? `${MONTH_NAMES[parseInt(state.month)-1]} ${state.year}` : state.year, key: 'year' });
  if (state.artist) chips.push({ label: `Artist: ${state.artist}`, key: 'artist' });
  if (state.track) chips.push({ label: `Track: ${state.track}`, key: 'track' });
  if (state.album) chips.push({ label: `Album: ${state.album}`, key: 'album' });
  if (chips.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = chips.map(c =>
    `<span class="filter-chip">${escHtml(c.label)} <span class="chip-remove" data-key="${c.key}">&times;</span></span>`
  ).join('');
  bar.querySelectorAll('.chip-remove').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.key;
      if (key === 'year') navigate({ year: null, month: null });
      else navigate({ [key]: null });
    };
  });
}

// Header meta

// Build tabs

TABS.forEach(t => {

  el.textContent = t.label;
  el.dataset.tab = t.id;
  el.onclick = () => navigate({ tab: t.id });
  tabsBar.appendChild(el);
});

// Hash navigation
function parseHash() {
  const h = location.hash.slice(1);
  const params = {};
  h.split('&').forEach(p => { const [k, v] = p.split('='); if (k) params[k] = decodeURIComponent(v); });
  return params;
}

function setHash(s) {
  const parts = [];
  if (s.tab) parts.push(`tab=${s.tab}`);
  ['year','month','artist','track','album'].forEach(k => {
    if (s[k]) parts.push(`${k}=${encodeURIComponent(s[k])}`);
  });
  location.hash = parts.join('&');
}

function navigate(partial) {
  Object.assign(state, partial);
  // Consistency: clearing year clears month
  if (partial.year === null) state.month = null;
  // Clearing artist clears track
  if (partial.artist === null) state.track = null;
  setHash(state);
  render();
}

window.addEventListener('hashchange', () => {
  const h = parseHash();
  state.tab = h.tab || 'overview';
  state.year = h.year || null;
  state.month = h.month || null;
  state.artist = h.artist || null;
  state.track = h.track || null;
  state.album = h.album || null;
  render();
});

// Year selector HTML
function yearSelectHTML(id, includeAll = true) {
  let opts = includeAll ? '<option value="all">All Time</option>' : '';
  S.meta.years.slice().reverse().forEach(y => {
    opts += `<option value="${y}">${y}</option>`;
  });
  return `<select class="year-select" id="${id}">${opts}</select>`;
}

// Read a CSS custom property value from :root / [data-theme]
function themeColor(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// ECharts theme defaults (dynamically updated from CSS vars)
const THEME = {
  backgroundColor: 'transparent',
  textStyle: { color: '#888' },
  title: { textStyle: { color: '#e0e0e0' } },
};

function updateThemeColors() {
  THEME.textStyle.color = themeColor('--text-dim');
  THEME.title.textStyle.color = themeColor('--text');
}

function makeChart(id, option) {
  const el = document.getElementById(id);
  if (!el) return null;
  if (charts[id]) { charts[id].dispose(); }
  updateThemeColors();
  const c = echarts.init(el, null, { renderer: 'canvas' });
  c.setOption({ ...THEME, ...option });
  charts[id] = c;
  return c;
}

// Theme toggle
function toggleTheme() {
  const root = document.documentElement;
  const isCurrentlyLight = root.getAttribute('data-theme') === 'light';
  if (isCurrentlyLight) {
    root.removeAttribute('data-theme');
    localStorage.setItem('lastfm-theme', 'dark');
  } else {
    root.setAttribute('data-theme', 'light');
    localStorage.setItem('lastfm-theme', 'light');
  }
  updateThemeToggleIcon();
  render();
}

function updateThemeToggleIcon() {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  // Show icon of what clicking will switch TO: moon = switch to dark, sun = switch to light
  btn.textContent = isLight ? '\u263D' : '\u2609';
}
document.getElementById('themeToggle').onclick = toggleTheme;
updateThemeToggleIcon();

// === Filter Panel UI ===
function openFilterPanel() {
  $('#filterPanel').classList.add('open');
  $('#filterOverlay').classList.add('open');
  $('#filterSearch').value = '';
  $('#filterSearchResults').innerHTML = '';
  renderExcludedList();
  setTimeout(() => $('#filterSearch').focus(), 100);
}

function closeFilterPanel() {
  $('#filterPanel').classList.remove('open');
  $('#filterOverlay').classList.remove('open');
}

$('#filterBtn').onclick = openFilterPanel;
$('#filterOverlay').onclick = closeFilterPanel;
$('#filterClose').onclick = closeFilterPanel;

$('#filterSearch').oninput = function() {
  const q = this.value.toLowerCase().trim();
  const results = $('#filterSearchResults');
  if (!q) { results.innerHTML = ''; return; }
  const matches = [];
  for (let i = 0; i < SC.a.length && matches.length < 20; i++) {
    if (SC.a[i].toLowerCase().includes(q) && !excludedArtists.has(SC.a[i])) {
      matches.push(SC.a[i]);
    }
  }
  if (matches.length === 0) {
    results.innerHTML = '<div class="filter-empty">No matching artists found</div>';
    return;
  }
  results.innerHTML = '';
  matches.forEach(name => {
    const div = document.createElement('div');
    div.className = 'filter-search-item';
    div.textContent = name;
    div.onclick = () => {
      excludedArtists.add(name);
      saveExcludedArtists();
      invalidateFilteredCache();
      renderExcludedList();
      updateExclusionUI();
      // Refresh search to remove the just-added artist
      $('#filterSearch').dispatchEvent(new Event('input'));
      render();
    };
    results.appendChild(div);
  });
};

function renderExcludedList() {
  const list = $('#filterExcludedList');
  const clearBtn = $('#filterClearAll');
  if (excludedArtists.size === 0) {
    list.innerHTML = '<div class="filter-empty">No artists excluded. Search above to add.</div>';
    clearBtn.style.display = 'none';
    return;
  }
  clearBtn.style.display = '';
  const sorted = [...excludedArtists].sort((a, b) => a.localeCompare(b));
  list.innerHTML = '';
  sorted.forEach(name => {
    const row = document.createElement('div');
    row.className = 'filter-excluded-item';
    const span = document.createElement('span');
    span.textContent = name;
    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.innerHTML = '&times;';
    btn.onclick = () => {
      excludedArtists.delete(name);
      saveExcludedArtists();
      invalidateFilteredCache();
      renderExcludedList();
      updateExclusionUI();
      render();
    };
    row.appendChild(span);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

$('#filterClearAll').onclick = () => {
  excludedArtists.clear();
  saveExcludedArtists();
  invalidateFilteredCache();
  renderExcludedList();
  updateExclusionUI();
  render();
};

function updateExclusionUI() {
  // Badge on filter button
  const btn = $('#filterBtn');
  let badge = btn.querySelector('.filter-badge');
  if (hasExclusions()) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'filter-badge';
      btn.appendChild(badge);
    }
    badge.textContent = excludedArtists.size;
  } else if (badge) {
    badge.remove();
  }

  // Header indicator
  const indicator = $('#exclusionIndicator');
  if (hasExclusions()) {
    indicator.innerHTML = `${excludedArtists.size} artist${excludedArtists.size > 1 ? 's' : ''} excluded <span class="clear-link" id="headerClearExclusions">clear</span>`;
    $('#headerClearExclusions').onclick = () => {
      excludedArtists.clear();
      saveExcludedArtists();
      renderExcludedList();
      updateExclusionUI();
      render();
    };
  } else {
    indicator.innerHTML = '';
  }
}

function render() {
  // Update header meta (reflects exclusions)
  updateHeaderMeta();

  // Update tab active state
  $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.tab));

    artists: renderArtists,

let drillLevel = 'yearly';

function renderDrill(level, year) {
  drillLevel = level;

  const title = $('#drillTitle');

  // Clean up scrobble table if navigating back
  const existingTable = document.getElementById('drillScrobbleTable');

  const drillChartEl = document.getElementById('drillChart');
  if (drillChartEl) drillChartEl.style.display = '';

  if (level === 'yearly') {
    title.textContent = 'Scrobbles per Year';
    bc.innerHTML = '';
    const data = getFilteredTimeSeries(getStateFilterParams()).yearly.map(y => ({ name: y.year, value: y.scrobbles }));
    const c = makeChart('drillChart', {
      tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
      xAxis: { type: 'category', data: data.map(d => d.name), axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
      yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
      series: [{ type: 'bar', data: data.map(d => d.value), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#ff6b35' }, { offset: 1, color: '#d51007' }]), borderRadius: [3, 3, 0, 0] }, emphasis: { itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#ff9f1c' }, { offset: 1, color: '#ff3b30' }]) } } }],
      grid: { left: 60, right: 20, bottom: 40, top: 20 },
    });
    c.off('click');
    c.on('click', params => renderDrill('monthly', params.name));
    // Update sub-charts for all-time (with entity filters from state)
    renderHourly(getStateFilterParams());
    renderDow(getStateFilterParams());

  } else if (level === 'monthly') {
    title.textContent = `Scrobbles in ${year}`;
    bc.innerHTML = `<span onclick="renderDrill('yearly')">All Years</span><span class="sep">›</span><span class="current">${year}</span>`;
    const months = getFilteredTimeSeries(getStateFilterParams()).monthly.filter(m => m.month.startsWith(year));
    const c = makeChart('drillChart', {
      tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
      xAxis: { type: 'category', data: months.map(m => MONTH_NAMES[parseInt(m.month.split('-')[1]) - 1]), axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
      yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
      series: [{ type: 'bar', data: months.map(m => m.count), itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#ff6b35' }, { offset: 1, color: '#d51007' }]), borderRadius: [3, 3, 0, 0] }, emphasis: { itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#ff9f1c' }, { offset: 1, color: '#ff3b30' }]) } } }],
      grid: { left: 60, right: 20, bottom: 40, top: 20 },
    });
    c.off('click');
    c.on('click', params => {
      const monthIdx = MONTH_NAMES.indexOf(params.name) + 1;
      const monthNum = String(monthIdx).padStart(2, '0');
      renderDrill('scrobbles', `${year}-${monthNum}`);
    });
    // Update sub-charts for this year (with entity filters from state)
    const yearRange = getTimeRange(year);
    const yearFp = { ...getStateFilterParams(), ...yearRange };
    renderHourly(yearFp);
    renderDow(yearFp);

  } else if (level === 'scrobbles') {
    // year is actually YYYY-MM here
    const [y, m] = year.split('-');
    title.textContent = `Scrobbles in ${fmtMonth(year)}`;
    bc.innerHTML = `<span onclick="renderDrill('yearly')">All Years</span><span class="sep">›</span><span onclick="renderDrill('monthly','${y}')">${y}</span><span class="sep">›</span><span class="current">${fmtMonth(year)}</span>`;

    // Dispose and hide chart, show scrobble table
    const chartEl = document.getElementById('drillChart');
    chartEl.style.display = 'none';
    if (charts['drillChart']) { charts['drillChart'].dispose(); delete charts['drillChart']; }

    // Get time range for this month (UTC to match scrobble timestamps)
    const startTs = Math.floor(Date.UTC(y, m - 1, 1) / 1000);
    const endTs = Math.floor(Date.UTC(y, m, 0, 23, 59, 59) / 1000);
    const scrobbles = getScrobblesInRange(startTs, endTs);
    scrobbles.sort((a, b) => b.timestamp - a.timestamp);

    // Insert table container after chart
    let tableContainer = document.getElementById('drillScrobbleTable');
    if (!tableContainer) {
      tableContainer = document.createElement('div');
      tableContainer.id = 'drillScrobbleTable';
      chartEl.parentNode.insertBefore(tableContainer, chartEl.nextSibling);
    }
    renderScrobbleTable(scrobbles, 'drillScrobbleTable');
    // Update sub-charts for this month
    const monthFp = { ...getStateFilterParams(), startTs, endTs };
    renderHourly(monthFp);
    renderDow(monthFp);
  }
}

function renderHeatmapRange() {
  const fromYear = parseInt($('#heatmapFrom').value);
  const toYear = parseInt($('#heatmapTo').value);
  const startY = Math.min(fromYear, toYear);
  const endY = Math.max(fromYear, toYear);
  const years = [];
  for (let y = startY; y <= endY; y++) years.push(String(y));

  const fts = getFilteredTimeSeries();
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const heatmapColors = isLight
    ? ['#ebedf0', '#fdd0cc', '#f4837d', '#d51007', '#a00d06']
    : ['#161b22', '#3d0c02', '#7a1a0a', '#d51007', '#ff6b35'];

  // Compute max across all selected years; fill all days to avoid blank cells
  let globalMax = 1;
  const allData = {};
  const emptyColor = heatmapColors[0];
  years.forEach(y => {
    const dayMap = {};
    fts.daily_counts.filter(d => d.date.startsWith(y)).forEach(d => {
      dayMap[d.date] = d.count;
      if (d.count > globalMax) globalMax = d.count;
    });
    // Fill every day in the year with 0 if not present
    const data = [];
    const start = new Date(Date.UTC(parseInt(y), 0, 1));
    const end = new Date(Date.UTC(parseInt(y), 11, 31));
    for (let d = new Date(start); d <= end; d.setUTCDate(d.getUTCDate() + 1)) {
      const key = d.toISOString().slice(0, 10);
      data.push([key, dayMap[key] || 0]);
    }
    allData[y] = data;
  });

  // Dynamic height: each year ~170px (7 rows * 16px + labels + gap)
  const yearHeight = 170;
  const totalHeight = years.length * yearHeight + 60;
  const heatmapEl = document.getElementById('heatmapChart');
  heatmapEl.style.height = totalHeight + 'px';

  const calendarConfigs = years.map((y, i) => ({
    range: y,
    cellSize: [16, 16],
    top: 40 + i * yearHeight, left: 80, right: 40,
    itemStyle: { color: emptyColor, borderColor: themeColor('--bg'), borderWidth: 2 },
    yearLabel: { show: years.length > 1, position: 'left', color: themeColor('--text-dim'), fontSize: 12, margin: 8 },
    monthLabel: { color: themeColor('--text-dim'), fontSize: 11 },
    dayLabel: { color: themeColor('--text-dim'), firstDay: 1, show: i === 0 },
    splitLine: { lineStyle: { color: themeColor('--border') } },
  }));

  const seriesConfigs = years.map((y, i) => ({
    type: 'heatmap',
    coordinateSystem: 'calendar',
    calendarIndex: i,
    data: allData[y],
  }));

  makeChart('heatmapChart', {
    tooltip: {
      formatter: p => `${p.value[0]}: ${p.value[1]} scrobbles`,
      backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') },
    },
    visualMap: {
      min: 0, max: globalMax, show: true,
      orient: 'horizontal', left: 'center', bottom: 10,
      inRange: { color: heatmapColors },
      textStyle: { color: themeColor('--text-dim') },
    },
    calendar: calendarConfigs,
    series: seriesConfigs,
  });
}

// ===== ARTISTS =====
function renderArtists(el) {
  el.innerHTML = `
    ${yearSelectHTML('artistYear')}
    <div class="chart-box">
      <h3>Top 50 Artists</h3>
      <div class="chart tall" id="artistsBarChart"></div>
    </div>
    <div class="chart-box" id="artistTrendBox" style="display:none">
      <h3 id="artistTrendTitle">Artist Trend</h3>
      <div class="chart" id="artistTrendChart"></div>
    </div>
    <div class="chart-box" id="artistScrobblesBox" style="display:none">
      <h3 id="artistScrobblesTitle">Artist Scrobbles</h3>
      <div id="artistScrobbleTable"></div>
    </div>
  `;

  function update(year) {
    const rawItems = year === 'all' ? S.top_artists.overall : (S.top_artists.by_year[year] || []);
    const items = filterTopArtists(rawItems);
    const top = items.slice(0, 50).reverse();
    const c = makeChart('artistsBarChart', {
      tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
      xAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
      yAxis: {
        type: 'category',
        data: top.map(a => a.name),
        axisLabel: { color: themeColor('--text-dim'), fontSize: 12, width: 220, overflow: 'truncate', ellipsis: '...', interval: 0 },
        axisLine: { lineStyle: { color: themeColor('--border') } },
        axisTick: { show: true, lineStyle: { color: themeColor('--border') } },
        splitLine: { show: true, lineStyle: { color: themeColor('--border'), opacity: 0.3, type: 'dashed' } },
      },
      series: [{
        type: 'bar',
        data: top.map(a => a.count),
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: '#b5179e' },
            { offset: 0.5, color: '#d51007' },
            { offset: 1, color: '#ff6b35' }
          ]),
          borderRadius: [0, 3, 3, 0],
        },
        emphasis: { itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#c77dff' },
          { offset: 0.5, color: '#ff3b30' },
          { offset: 1, color: '#ff9f1c' }
        ]) } },
        barWidth: '65%',
      }],
      grid: { left: 240, right: 40, bottom: 20, top: 10 },
    });
    c.off('click');
    c.on('click', params => showArtistTrend(params.name));
  }

  update(state.year || 'all');
  $('#artistYear').value = state.year || 'all';
  $('#artistYear').onchange = e => { state.year = e.target.value; update(e.target.value); };
}

function showArtistTrend(artist) {
  const box = $('#artistTrendBox');
  if (!box) return;
  box.style.display = 'block';
  $('#artistTrendTitle').textContent = `${artist} — Yearly Trend`;
  const trend = S.artist_trends[artist];
  let years, data;
  if (trend) {
    years = Object.keys(trend).sort();
    data = years.map(y => trend[y]);
  } else {
    years = S.meta.years;
    data = years.map(y => {
      const items = S.top_artists.by_year[y] || [];
      const found = items.find(a => a.name === artist);
      return found ? found.count : 0;
    });
  }
  makeChart('artistTrendChart', {
    tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
    xAxis: { type: 'category', data: years, axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
    yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
    series: [{ type: 'line', data, smooth: true, lineStyle: { color: themeColor('--accent') }, itemStyle: { color: themeColor('--accent') }, areaStyle: { color: 'rgba(213,16,7,0.15)' } }],
    grid: { left: 60, right: 20, bottom: 40, top: 20 },
  });
  // Show individual scrobbles for this artist
  const scrobbleBox = $('#artistScrobblesBox');
  if (scrobbleBox) {
    scrobbleBox.style.display = 'block';
    $('#artistScrobblesTitle').textContent = `${artist} — All Scrobbles`;
    const artistScrobbles = getScrobblesByArtist(artist);
    artistScrobbles.sort((a, b) => b.timestamp - a.timestamp);
    renderScrobbleTable(artistScrobbles, 'artistScrobbleTable');
  }
  requestAnimationFrame(() => box.scrollIntoView({ behavior: 'smooth' }));
}

// ===== TRACKS =====
function renderTracks(el) {
  const entityLabel = state.artist ? ` — ${escHtml(state.artist)}` : '';
  el.innerHTML = `
    ${yearSelectHTML('trackYear')}
    <div class="chart-box">
      <h3>Top Tracks${entityLabel}</h3>
      <table class="stats-table" id="tracksTable"></table>
    </div>
  `;

  function update(year) {
    const items = getTopItems('tracks', year);
    const table = $('#tracksTable');
    table.innerHTML = `<thead><tr><th class="rank">#</th><th>Track</th><th class="count">Plays</th></tr></thead>` +
      '<tbody>' + items.slice(0, 50).map((t, i) => {
        const [artist, ...rest] = t.name.split(' — ');
        const track = rest.join(' — ');
        return `<tr><td class="rank">${i + 1}</td><td>${escHtml(track)}<br><small style="color:var(--text-dim)">${escHtml(artist)}</small></td><td class="count">${fmt(t.count)}</td></tr>`;
      }).join('') + '</tbody>';
  }

  update(state.year || 'all');
  $('#trackYear').value = state.year || 'all';
  $('#trackYear').onchange = e => { state.year = e.target.value; update(e.target.value); };
}

// ===== ALBUMS =====
function renderAlbums(el) {
  const entityLabel = state.artist ? ` — ${escHtml(state.artist)}` : '';
  el.innerHTML = `
    ${yearSelectHTML('albumYear')}
    <div class="chart-box">
      <h3>Top Albums${entityLabel}</h3>
      <table class="stats-table" id="albumsTable"></table>
    </div>
  `;

  function update(year) {
    const items = getTopItems('albums', year);
    const table = $('#albumsTable');
    table.innerHTML = `<thead><tr><th class="rank">#</th><th>Album</th><th class="count">Plays</th></tr></thead>` +
      '<tbody>' + items.slice(0, 50).map((a, i) => {
        const [artist, ...rest] = a.name.split(' — ');
        const album = rest.join(' — ');
        return `<tr><td class="rank">${i + 1}</td><td>${escHtml(album)}<br><small style="color:var(--text-dim)">${escHtml(artist)}</small></td><td class="count">${fmt(a.count)}</td></tr>`;
      }).join('') + '</tbody>';
  }

  update(state.year || 'all');
  $('#albumYear').value = state.year || 'all';
  $('#albumYear').onchange = e => { state.year = e.target.value; update(e.target.value); };
}

// ===== LOVED =====
function renderLoved(el) {
  let lovedItems = hasExclusions() ? S.loved.filter(t => !excludedArtists.has(t.artist)) : S.loved;
  if (state.artist) lovedItems = lovedItems.filter(t => t.artist === state.artist);
  if (state.track) lovedItems = lovedItems.filter(t => t.track === state.track);
  if (state.album) lovedItems = lovedItems.filter(t => t.album === state.album);
  el.innerHTML = `
    <input class="search-input" id="lovedSearch" placeholder="Search loved tracks...">
    <div class="chart-box">
      <h3>Loved Tracks (${fmt(lovedItems.length)})${hasExclusions() ? ' <small style="color:var(--text-dim);font-weight:normal">(filtered)</small>' : ''}</h3>
      <div id="lovedList"></div>
    </div>
  `;

  function update(query) {
    const q = query.toLowerCase();
    const filtered = q ? lovedItems.filter(t => `${t.artist} ${t.track} ${t.album}`.toLowerCase().includes(q)) : lovedItems;
    const list = $('#lovedList');
    list.innerHTML = filtered.slice(0, 200).map(t =>
      `<div class="loved-item"><span class="date">${fmtDate(t.timestamp)}</span><strong>${escHtml(t.track)}</strong> <span class="artist">by ${escHtml(t.artist)}</span></div>`
    ).join('') + (filtered.length > 200 ? `<div style="padding:12px;color:var(--text-dim)">...and ${filtered.length - 200} more</div>` : '');
  }

  update('');
  $('#lovedSearch').oninput = e => update(e.target.value);
}

// ===== TRENDS =====
function renderTrends(el) {
  el.innerHTML = `
    <div class="chart-box">
      <h3>Monthly Scrobbles (Full Timeline)</h3>
      <div class="chart tall" id="monthlyLineChart"></div>
    </div>
    <div class="chart-box">
      <h3>Cumulative Scrobbles</h3>
      <div class="chart" id="cumulativeChart"></div>
    </div>
    <div class="chart-box">
      <h3>Top Artists Over Time</h3>
      <div class="chart tall" id="artistStackChart"></div>
    </div>
  `;

  const fts = getFilteredTimeSeries();

  // Monthly line
  makeChart('monthlyLineChart', {
    tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
    dataZoom: [{ type: 'inside' }, { type: 'slider', bottom: 10, textStyle: { color: themeColor('--text-dim') } }],
    xAxis: { type: 'category', data: fts.monthly.map(m => m.month), axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
    yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
    series: [{ type: 'line', data: fts.monthly.map(m => m.count), smooth: true, lineStyle: { color: themeColor('--accent'), width: 1.5 }, itemStyle: { color: themeColor('--accent') }, areaStyle: { color: 'rgba(213,16,7,0.1)' }, symbol: 'none' }],
    grid: { left: 60, right: 20, bottom: 60, top: 20 },
  });

  // Cumulative
  let cumulative = [];
  let sum = 0;
  fts.monthly.forEach(m => { sum += m.count; cumulative.push(sum); });
  // Add milestone markers
  const milestones = [10000, 25000, 50000, 75000, 100000];
  const markPoints = [];
  milestones.forEach(ms => {
    const idx = cumulative.findIndex(v => v >= ms);
    if (idx >= 0) markPoints.push({ coord: [idx, cumulative[idx]], value: `${ms / 1000}K`, itemStyle: { color: themeColor('--accent') } });
  });

  makeChart('cumulativeChart', {
    tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') }, formatter: p => `${p[0].axisValue}: ${fmt(p[0].value)} total` },
    xAxis: { type: 'category', data: fts.monthly.map(m => m.month), axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
    yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim'), formatter: v => `${(v/1000).toFixed(0)}K` }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
    series: [{ type: 'line', data: cumulative, smooth: true, lineStyle: { color: themeColor('--accent') }, areaStyle: { color: 'rgba(213,16,7,0.1)' }, symbol: 'none', markPoint: { data: markPoints, label: { fontSize: 10, color: themeColor('--text') } } }],
    grid: { left: 60, right: 20, bottom: 40, top: 20 },
  });

  // Top 5 artists stacked area
  const topArtistNames = filterTopArtists(S.top_artists.overall).slice(0, 5).map(a => a.name);
  const colors = ['#d51007', '#ff6b35', '#f7c948', '#47b881', '#5c7cfa'];
  const stackSeries = topArtistNames.map((name, i) => {
    const trend = fts.artist_yearly[name] || {};
    return {
      name,
      type: 'line',
      stack: 'total',
      areaStyle: { opacity: 0.4 },
      lineStyle: { color: colors[i], width: 1 },
      itemStyle: { color: colors[i] },
      data: (fts.years || S.meta.years).map(y => trend[y] || 0),
      symbol: 'none',
    };
  });

  makeChart('artistStackChart', {
    tooltip: { trigger: 'axis', backgroundColor: themeColor('--surface2'), borderColor: themeColor('--border'), textStyle: { color: themeColor('--text') } },
    legend: { data: topArtistNames, textStyle: { color: themeColor('--text-dim') }, bottom: 10 },
    xAxis: { type: 'category', data: fts.years || S.meta.years, axisLabel: { color: themeColor('--text-dim') }, axisLine: { lineStyle: { color: themeColor('--border') } } },
    yAxis: { type: 'value', axisLabel: { color: themeColor('--text-dim') }, splitLine: { lineStyle: { color: themeColor('--surface2') } } },
    series: stackSeries,
    grid: { left: 60, right: 20, bottom: 60, top: 20 },
  });
}

// Helpers
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Init
const initHash = parseHash();
state.tab = initHash.tab || 'overview';
state.year = initHash.year || null;
state.month = initHash.month || null;
state.artist = initHash.artist || null;
state.track = initHash.track || null;
state.album = initHash.album || null;
render();
</script>
</body>
</html>
